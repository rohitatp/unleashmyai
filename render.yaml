services:
  - type: web
    runtime: node
    name: unleashmyai
    repo: https://github.com/rohitatp/unleashmyai
    branch: main
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    domains:
      - unleashmyai.com
    envVars:
      - key: NODE_VERSION
        value: 22
      # Secrets — set the values in the Render dashboard, never in this file.
      # Paid credits (Stripe + Supabase + owner LLM key)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OWNER_LLM_API_KEY
        sync: false
      - key: OWNER_LLM_PROVIDER
        sync: false
      - key: OWNER_LLM_MODEL
        sync: false
